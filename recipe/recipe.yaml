schema_version: 1

context:
  version: 0.16.2

package:
  name: django-typed-models
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/django-typed-models/django_typed_models-${{ version }}.tar.gz
  sha256: 3e76d2d067052aa8b6436b42dfe7773d5793477e1d8c192130c6aad76a346795

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - django >=5.2
    - typing_extensions
tests:
  - python:
      imports:
        - typedmodels
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: Sane single table model inheritance for Django
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://github.com/craigds/django-typed-models

extra:
  recipe-maintainers:
    - ocefpaf
    - kwilcox
